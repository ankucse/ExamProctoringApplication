spring:
  application:
    name: ExamProctoringApplication

  # MongoDB Configuration
  data:
    mongodb:
      uri: mongodb://localhost:27017/exam-platform
      auto-index-creation: true

  # Enable Virtual Threads (Java 21+)
  threads:
    virtual:
      enabled: true

server:
  port: 8080

# Logging Configuration
logging:
  level:
    root: INFO
    com.exam.proctoring: DEBUG
    org.springframework.data.mongodb.core.MongoTemplate: DEBUG

vaadin:
  productionMode: false
