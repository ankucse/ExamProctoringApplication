global:
  scrape_interval: 15s

scrape_configs:
  - job_name: 'proctoring-service'
    metrics_path: '/actuator/prometheus'
    static_configs:
      - targets: ['host.docker.internal:8083'] # Use host.docker.internal to reach services running on localhost outside docker
  - job_name: 'api-gateway'
    metrics_path: '/actuator/prometheus'
    static_configs:
      - targets: ['host.docker.internal:8080']
